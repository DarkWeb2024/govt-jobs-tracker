name: daily-tracker

on:
  schedule:
    # 23:40 IST = 18:10 UTC
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          TRACKER_SMTP_USER: ${{ secrets.TRACKER_SMTP_USER }}
          TRACKER_SMTP_PASS: ${{ secrets.TRACKER_SMTP_PASS }}
          TRACKER_MS_CLIENT_ID: ${{ secrets.TRACKER_MS_CLIENT_ID }}
          TRACKER_CALLMEBOT_PHONE: ${{ secrets.TRACKER_CALLMEBOT_PHONE }}
          TRACKER_CALLMEBOT_APIKEY: ${{ secrets.TRACKER_CALLMEBOT_APIKEY }}
        run: python main.py

      - name: Commit refreshed site and data
        run: |
          git config user.name "tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs Reports data/tracker.db
          git diff --cached --quiet || git commit -m "Daily update $(date -u +%F)"
          git push
